<!DOCTYPE html>
<html>
    <head>
        <title>WebSocket demo</title>
        <style type="text/css">
            body {
                font-family: "Courier New", sans-serif;
                text-align: center;
            }
            .cards{
                font-size:3em
            }
            .buttons {
                font-size: 2em;
                display: flex;
                justify-content: center;
            }
            .button, .value {
                line-height: 1;
                padding: 2rem;
                margin: 2rem;
                border: medium solid;
                min-height: 1em;
                min-width: 1em;
            }
            .button {
                cursor: pointer;
                user-select: none;
            }
            #play {
                color: green;
            }
            #pass {
                color: orange;
            }

            .state {
                font-size: 2em;
            }
        </style>
    </head>
    <body>
        <div id="cards">
        </div>
        <div class="buttons">
            <div id="schupf" class="button">Schupf</div>
            <div id="play" class="button">Play</div>
            <div id="pass" class="button">Pass</div>
            <div class="button">Small Tichu</div>
            <div class="button">Big Tichu</div>
        </div>
        <div id="state">
        </div>
        <div id="log">
        </div>
        <script src="tichu-client.js" >
        </script>
    </body>
</html>
